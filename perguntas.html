<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        var nome = prompt("Bom dia, qual o seu nome?");
        document.write("Bom dia! " + nome + "<br>");
        document.write("Bem vindo, " + nome + "<br>");

        var idade = prompt(nome + ", quantos anos você tem?")
        document.write(nome + "tem" + idade + "anos.");
        
    </script>
</body>
</html>
