<script>
    var a = parseInt(prompt("Digite o valor da prova a: "));
    var b = parseInt(prompt("Digite o valor da prova b: "));
    var c = parseInt(prompt("Digite o valor da prova c: "));
    var d = a * 2
    var e = b * 3
    var f = c * 5
    var média = d + e + f / 3;
    document.write("A média das provas é de: " + média);
</script>
