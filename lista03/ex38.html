    if (soma < c) {
        document.write("A soma de a + b é maior que o valor c: " + c)
    } else if (soma = c) {
        document.write("A soma de a + b é igual ao valor de c: " + c)
    } else if (soma > c) {
        document.write("A soma de a + b é menor que C: " + c);
    }
</script>
