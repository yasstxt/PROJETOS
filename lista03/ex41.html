<script>
    var salario = parseFloat(prompt("Digite o valor do salario: "));
    var carros = parseFloat(prompt("Digite quantos carros foram vendidos: "));
    var total = salario * salario;
    var c = carros * 50 
    var comissao = c * 0.5;
    var salarioTotal = c + comissao + total

    document.write("O salário total de um vendedor é de: " + salarioTotal);
</script>
