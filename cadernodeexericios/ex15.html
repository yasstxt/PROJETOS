<body>
    <script>
        var tempo = parseInt(prompt("Digite o tempo da viagem: "));
        var velocidade = parseInt(prompt("Digite a velocidade média em km/hr: "));
        var distancia = tempo * velocidade ;
        var litros = distancia / 12 ;
        document.write("A velocidade média é de: " + "<br>");
        document.write("O tempo gasto foi de: " + tempo + "<br>");
        document.write("A distância é de: " + distância + "<br>");
        document.write("Os litros usados foram: " + litros + "<br>");
    </script>
</body>
