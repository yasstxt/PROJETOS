<body>
    <script>
        var HT = parseInt(prompt("Digite suas horas trabalhadas no mês: "));
        var VH = parseInt(prompt("Digite suas horas trabalhadas: "));
        var PD = parseInt(prompt("Digite seu valor de desconto: "));
        var SB = HT * VH ;
        var TD = (PD/100) * SB ;
        var SL = SB - TD ;
        document.write("Horas trabalhadas: " + HT + "<br>");
        document.write("Valor de horas trabalhadas: " + SB + "<br>");
        document.write("Salário bruto: " + TD + "<br>");
        document.write("Desconto: " + SL);
        document.write("Salário liquído: ")
    </script>
</body>
